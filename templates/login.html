<!doctype html>
<html>
  <head>
    <title>Login | AI Dashboard</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        width: 320px;
        text-align: center;
        color: white;
        transition: 0.3s;
      }

      .glass-card:hover {
        transform: scale(1.03);
      }

      h2 {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        outline: none;
      }

      button {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: #00c6ff;
        color: black;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
      }

      button:hover {
        background: #0072ff;
        color: white;
      }

      .footer {
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="glass-card">
      <h2>🔐 Login</h2>

      <form method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />

        <button type="submit">Login</button>
      </form>

      {% if error %}
      <p style="color: #ff4d4d">{{ error }}</p>
      {% endif %}

      <div class="footer">AI Payment Insights Dashboard</div>
    </div>
  </body>
</html>
