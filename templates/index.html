<!DOCTYPE html>
<html>
<head>
    <title>AI Payment Insights Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .glass:hover {
            transform: scale(1.02);
        }

        input, button {
            padding: 10px;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
        }

        button {
            background: #00c6ff;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0072ff;
            color: white;
        }

        .section {
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
        }

        #fraud {
            color: #ff4d4d;
            font-weight: bold;
            font-size: 17px;
        }

        #patterns {
            color: #ffffff;
        }

        #suggestions {
            color: #a8ffb0;
        }

        canvas {
            margin-top: 20px;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>💳 AI Payment Insights Dashboard</h1>

    <!-- Upload Section -->
    <div class="glass">
        <h3>Upload Transaction File</h3>
        <input type="file" id="fileInput">
        <br>
        <button onclick="uploadFile()">Analyze</button>
    </div>

    <!-- AI Insights -->
    <div class="glass">
        <h3>🤖 AI Insights</h3>

        <div id="fraud" class="section">🚨 Fraud alerts will appear here...</div>
        <div id="patterns" class="section">📊 Spending patterns will appear here...</div>
        <div id="suggestions" class="section">💡 Suggestions will appear here...</div>

        <button onclick="downloadReport()">Download Report</button>
    </div>

    <!-- Chart Section -->
    <div class="glass">
        <h3>📊 Spending Dashboard</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
