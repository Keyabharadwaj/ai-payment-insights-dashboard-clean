{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">Upload Transaction Dataset</h2>

    <div class="card shadow-lg">

        <div class="card-body">

            <form id="uploadForm" enctype="multipart/form-data">

                <div class="upload-box">

                    <i class="bi bi-cloud-arrow-up-fill display-2 text-primary"></i>

                    <h4 class="mt-3">Drag & Drop your CSV file</h4>

                    <p class="text-muted">or click below to browse</p>

                    <input
                        type="file"
                        id="fileInput"
                        name="file"
                        accept=".csv"
                        hidden
                    >

                    <button
                        type="button"
                        class="btn btn-primary mt-3"
                        onclick="document.getElementById('fileInput').click()">

                        Choose File

                    </button>

                    <div id="fileInfo" class="mt-4"></div>

                </div>

                <div class="text-center mt-4">

                    <button
                        class="btn btn-success btn-lg"
                        type="submit">

                        Analyze Dataset

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<h2>Uploads</h2>

{% endblock %}
